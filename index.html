<meta charset="utf-8">
<title></title>
<!-- EmailJS --><script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script><script>
(function(){
  emailjs.init("C_99LpfwrQTVLC6SI");
})();
</script>
<style type="text/css">table {
  border-collapse: collapse;
  width: 100%;
  max-width: 900px;
}
th, td {
  padding: 8px;
  border: 1px solid #999;
  text-align: center;
}
img {
  width: 80px;
}
input[type="number"] {
  width: 60px;
}
</style>
<p>訂購步驟：<br />
①填寫收件資料<br />
③選擇所需購買的商品數量<br />
④訂購總金額會自動顯示<br />
⑤付款</p>

<h2>產品訂購單</h2>

<form id="orderForm">
<p>姓名： <input id="name" name="name" required="" type="text" /></p>

<p>電話： <input id="phone" name="phone" required="" type="tel" /></p>

<p>Email： <input id="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" placeholder="請輸入正確 Email" required="" title="請輸入有效的電子郵件，如 example@gmail.com" type="email" /></p>

<p>地址： <input id="address" name="address" required="" style="width:80%" type="text" /></p>

<p>您的匯款帳號後五碼： <input id="number" name="number" required="" type="text" /></p>

<table>
	<thead>
		<tr>
			<th>商品圖片</th>
			<th>商品名稱</th>
			<th>單價</th>
			<th>數量</th>
		</tr>
	</thead>
	<tbody><!-- 範例商品 -->
		<tr>
			<td>
			<table>
				<tbody>
					<tr>
						<td><img alt="鳳梨酥" src="https://down-tw.img.susercontent.com/file/d59ae99076c44d33b96e304fc62fc6dc.webp" style="width: 100px; height: 100px;" /><img alt="蔓越莓酥" src="https://down-tw.img.susercontent.com/file/tw-11134207-7qul7-lind2n3xu1tg4d.webp" style="width: 100px; height: 100px;" /></td>
					</tr>
				</tbody>
			</table>
			</td>
			<td>享溫馨 魚萃 60ML /100包</td>
			<td>5880</td>
			<td><input class="item" data-name="鳳梨酥一圓形 550g 12盒/箱" data-price="5800" min="0" type="number" value="0" /></td>
		</tr>
		<tr>
			<td><img alt="" src="https://down-tw.img.susercontent.com/file/tw-11134207-81ztd-mfy31be6sl5701.webp" style="width: 100px; height: 100px;" />
			<table>
				<tbody>
					<tr>
						<td><img alt="" src="https://down-tw.img.susercontent.com/file/tw-11134207-81ztp-mfy31kdn6nm56d.webp" style="width: 100px; height: 100px;" /></td>
					</tr>
				</tbody>
			</table>
			</td>
			<td>享溫馨 滴雞精 60ML /100包</td>
			<td>5800</td>
			<td><input class="item" data-name="蔓越莓酥─彩盒版 250g 12盒/箱" data-price="5800" min="0" type="number" value="0" /></td>
		</tr>
		<!-- 可以依照需求再加入更多商品 -->
	</tbody>
</table>

<p>商品小計： <input id="subtotal" readonly="readonly" type="text" value="0" /> 元</p>

<p>運費（郵局）： <input id="shipping" readonly="readonly" type="text" value="0" /> 元</p>

<p><strong>訂購總金額：</strong> <input id="total" name="total" readonly="readonly" type="text" value="0" /> 元</p>

<p><button type="submit">送出訂單</button></p>
</form>
<script>
const items = document.querySelectorAll('.item');
const subtotalInput = document.getElementById('subtotal');
const shippingInput = document.getElementById('shipping');
const totalInput = document.getElementById('total');

function calcTotal() {
  let subtotal = 0;
  items.forEach(item => {
    const qty = Number(item.value) || 0;
    const price = Number(item.dataset.price) || 0;
    subtotal += qty * price;
  });

  let shipping = 0;
  if (subtotal > 0 && subtotal < 3000) shipping = 120;

  subtotalInput.value = subtotal;
  shippingInput.value = shipping;
  totalInput.value = subtotal + shipping;
}

// 監聽數量變化
items.forEach(item => item.addEventListener('input', calcTotal));
calcTotal(); // 頁面載入先計算一次

document.getElementById('orderForm').addEventListener('submit', function(e){
  e.preventDefault();

  const emailValue = document.getElementById('email').value;
  // 簡單檢查 Email 格式
  if (!emailValue.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
    alert("請輸入有效的 Email");
    return;
  }

  let orderText = '';
  items.forEach(item => {
    const qty = Number(item.value) || 0;
    const price = Number(item.dataset.price) || 0;
    if (qty > 0) {
      orderText += `${item.dataset.name} x ${qty}（$${price}）\n`;
    }
  });

  if (orderText === '') {
    alert("請至少選擇一樣商品");
    return;
  }

  emailjs.send(
    "service_e9p1mas",
    "template_rlpw265",
    {
      name: document.getElementById("name").value,
      phone: document.getElementById("phone").value,
      email: emailValue,
      address: document.getElementById("address").value,
      number: document.getElementById("number").value,
      order: orderText,
      subtotal: subtotalInput.value,
      shipping: shippingInput.value,
      total: totalInput.value,
      cc_email: emailValue // 送確認信給填寫的 Email
    }
  ).then(function(){
    alert("訂單送出成功！\n匯款完再麻煩來電告知 06-2662226");
    location.reload();
  }, function(error){
    alert("寄送失敗，請稍後再試\n" + error.text);
  });
});
</script>
